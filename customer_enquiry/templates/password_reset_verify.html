{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Spenta CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { min-height: 100vh; background: url('https://spentacorporation.com/wp-content/uploads/2024/08/Altavista-Homepage-banner.jpg') no-repeat center center/cover; display: flex; flex-direction: column; }
        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 150px 20px 100px; }
        .form-container { background: white; padding: 3rem 2.5rem; border-radius: 20px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; }
        .form-title { font-size: 28px; font-weight: 600; color: #333; margin-bottom: 0.8rem; }
        .form-subtitle { font-size: 14px; color: #666; margin-bottom: 2.5rem; line-height: 1.4; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; color: #333; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 14px 16px; border: 2px solid #e1e1e1; border-radius: 8px; font-size: 16px; outline: none; transition: border-color 0.3s; background: #fafafa; }
        .form-group input:focus { border-color: #fbd44a; background: white; }
        .submit-btn { width: 100%; padding: 16px; border: none; border-radius: 50px; background: #fbd44a; color: #333; font-weight: 600; cursor: pointer; font-size: 16px; transition: all 0.3s; margin-top: 1rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .submit-btn:hover { background: #f0c83a; transform: translateY(-2px); }
        .django-messages { margin-bottom: 1.5rem; }
        .django-message { padding: 12px 16px; border-radius: 8px; margin-bottom: 10px; font-size: 14px; }
        .django-message.error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
        .django-message.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a; }
        .back-link { margin-top: 1rem; display: block; color: #666; text-decoration: none; font-size: 14px; }
        .back-link:hover { color: #333; }
        header { position: absolute; display: flex; justify-content: space-between; align-items: center; z-index: 1; width: 100%; padding: 25px 6%; }
        header img { height: 100px; }
    </style>
</head>
<body>
    <header>
        <div></div>
        <nav class="logo">
            <img src="{% static 'media/spenta_white.png' %}" alt="Spenta Logo">
        </nav>
    </header>

    <main>
        <div class="form-container">
            <h1 class="form-title">Enter OTP</h1>
            <p class="form-subtitle">Enter the 6-digit OTP sent to your registered WhatsApp number.</p>

            {% if messages %}
                <div class="django-messages">
                    {% for message in messages %}
                        <div class="django-message {{ message.tags }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="otp">OTP</label>
                    <input type="text" id="otp" name="otp" placeholder="Enter 6-digit OTP" maxlength="6" required autofocus>
                </div>
                <button type="submit" class="submit-btn">Verify OTP</button>
            </form>

            <a href="{% url 'customer_enquiry:password_reset' %}" class="back-link">← Request new OTP</a>
        </div>
    </main>
</body>
</html>
